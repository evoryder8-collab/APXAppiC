<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body { background: linear-gradient(160deg, #eef2f7 0%, #e4eaf2 45%, #dde5ef 100%); }
    a { color: #0e5f7a; } a:hover { color: #0a4a60; }
    ::selection { background: rgba(56,182,255,0.25); }
  </style>
</helmet>

<div style="min-height: 100vh; display: grid; place-items: center; padding: 40px 24px; font-family: 'Space Grotesk', sans-serif; box-sizing: border-box;">

  <div style="width: 100%; max-width: 1080px; display: grid; grid-template-columns: 1fr 300px; gap: 0; background: rgba(255,255,255,0.55); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.75); border-radius: 24px; box-shadow: 0 24px 64px rgba(30,45,70,0.14), 0 2px 8px rgba(30,45,70,0.06); overflow: hidden;">

    <!-- viewport -->
    <div style="position: relative; min-height: 620px; margin: 16px; border-radius: 16px; overflow: hidden; background: #060b16; box-shadow: inset 0 0 0 1px rgba(120,190,255,0.10), inset 0 2px 24px rgba(0,0,0,0.6);">
      <x-import component="HoloBody" from="./holo-body.jsx" highlighted-muscles="{{ activeMuscles }}" rotation-seconds="{{ rotationSeconds }}" highlight-tone="{{ highlightTone }}" hint-size="100%,620px"></x-import>
      <!-- HUD chrome -->
      <div style="position: absolute; top: 16px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: baseline; pointer-events: none;">
        <div style="color: #6fd3ff; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.85;">Biometric projection</div>
        <div style="color: #3b6a8f; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;">{{ activeLabel }}</div>
      </div>
      <div style="position: absolute; bottom: 14px; left: 20px; color: #2f5d80; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; pointer-events: none;">Drag to rotate · scroll to zoom</div>
    </div>

    <!-- panel -->
    <div style="padding: 32px 28px 28px 12px; display: flex; flex-direction: column; gap: 20px;">
      <div style="display: flex; flex-direction: column; gap: 6px;">
        <div style="font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #7a8698;">Training focus</div>
        <div style="font-size: 22px; font-weight: 600; color: #1c2734; line-height: 1.15;">Today&rsquo;s session</div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <sc-for list="{{ days }}" as="day" hint-placeholder-count="5">
          <button onClick="{{ day.select }}" style="{{ day.style }}" style-hover="border-color: rgba(56,140,200,0.55); background: rgba(255,255,255,0.85);" style-active="transform: scale(0.985);">
            <span>{{ day.label }}</span>
            <span style="{{ day.dotStyle }}"></span>
          </button>
        </sc-for>
      </div>

      <div style="display: flex; flex-direction: column; gap: 10px; margin-top: auto;">
        <div style="font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #7a8698;">Highlighted groups</div>
        <div style="display: flex; flex-wrap: wrap; gap: 6px; min-height: 54px; align-content: flex-start;">
          <sc-for list="{{ chips }}" as="chip" hint-placeholder-count="4">
            <span style="font-size: 11.5px; font-weight: 500; letter-spacing: 0.04em; color: #8a4d12; background: rgba(255,171,64,0.16); border: 1px solid rgba(214,138,40,0.35); border-radius: 999px; padding: 4px 10px;">{{ chip }}</span>
          </sc-for>
          <sc-if value="{{ noneActive }}" hint-placeholder-val="{{ false }}">
            <span style="font-size: 12px; color: #93a1b3;">Rest day — nothing highlighted.</span>
          </sc-if>
        </div>
      </div>

      <div style="font-size: 11.5px; line-height: 1.55; color: #93a1b3; border-top: 1px solid rgba(28,39,52,0.10); padding-top: 14px;">
        Integration: pass <span style="font-family: ui-monospace, monospace; color: #5c6b7d;">highlightedMuscles: MuscleGroup[]</span> to the component — see <span style="font-family: ui-monospace, monospace; color: #5c6b7d;">HoloBody.tsx</span>.
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;rotationSeconds&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 13, &quot;min&quot;: 8, &quot;max&quot;: 30, &quot;step&quot;: 1, &quot;unit&quot;: &quot;s&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Hologram&quot; },
  &quot;highlightTone&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;amber&quot;, &quot;options&quot;: [&quot;amber&quot;, &quot;copper&quot;], &quot;tsType&quot;: &quot;'amber' | 'copper'&quot;, &quot;section&quot;: &quot;Hologram&quot; }
}">
class Component extends DCLogic {
  state = { day: 'push' };

  DAYS = [
    { id: 'push', label: 'Push Day', muscles: ['chest', 'frontDelts', 'sideDelts', 'triceps'] },
    { id: 'pull', label: 'Pull Day', muscles: ['lats', 'upperBack', 'rearDelts', 'biceps', 'forearms'] },
    { id: 'legs', label: 'Leg Day', muscles: ['quads', 'hamstrings', 'glutes', 'calves'] },
    { id: 'core', label: 'Core Day', muscles: ['abs', 'obliques', 'lowerBack'] },
    { id: 'rest', label: 'Rest Day', muscles: [] }
  ];

  NAMES = {
    chest: 'Chest', frontDelts: 'Front delts', sideDelts: 'Side delts', rearDelts: 'Rear delts',
    biceps: 'Biceps', triceps: 'Triceps', forearms: 'Forearms', upperBack: 'Upper back',
    lats: 'Lats', lowerBack: 'Lower back', abs: 'Abs', obliques: 'Obliques',
    glutes: 'Glutes', quads: 'Quads', hamstrings: 'Hamstrings', calves: 'Calves', neckTraps: 'Neck & traps'
  };

  btnStyle(active) {
    return {
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      width: '100%', padding: '12px 16px', borderRadius: '14px', cursor: 'pointer',
      fontFamily: "'Space Grotesk', sans-serif", fontSize: '14px', fontWeight: 600,
      letterSpacing: '0.02em', textAlign: 'left',
      color: active ? '#0d3a52' : '#3d4c5e',
      background: active ? 'rgba(120,205,255,0.28)' : 'rgba(255,255,255,0.6)',
      border: active ? '1px solid rgba(48,150,210,0.6)' : '1px solid rgba(28,39,52,0.12)',
      boxShadow: active ? '0 4px 16px rgba(48,150,210,0.18)' : 'none',
      transition: 'all 160ms ease'
    };
  }

  dotStyle(active) {
    return {
      width: '8px', height: '8px', borderRadius: '50%',
      background: active ? '#ffab40' : 'rgba(28,39,52,0.18)',
      boxShadow: active ? '0 0 8px rgba(255,171,64,0.8)' : 'none',
      transition: 'all 160ms ease'
    };
  }

  renderVals() {
    const cur = this.DAYS.find(d => d.id === this.state.day) || this.DAYS[0];
    return {
      rotationSeconds: this.props.rotationSeconds ?? 13,
      highlightTone: this.props.highlightTone ?? 'amber',
      days: this.DAYS.map(d => ({
        label: d.label,
        select: () => this.setState({ day: d.id }),
        style: this.btnStyle(d.id === cur.id),
        dotStyle: this.dotStyle(d.id === cur.id)
      })),
      activeMuscles: cur.muscles,
      activeLabel: cur.label,
      chips: cur.muscles.map(m => this.NAMES[m]),
      noneActive: cur.muscles.length === 0
    };
  }
}
</script>
</body>
</html>
